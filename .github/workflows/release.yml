name: Build desktop packages

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    name: Package ${{ matrix.name }} ${{ matrix.editionLabel }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            edition: lite
            editionLabel: Lite
            os: windows-latest
            script: npm run dist:win -- --publish never
            artifact: GitInsight-AI-Lite-Windows
            paths: |
              release/**/*.exe
              release/**/*.zip
              release/**/*.blockmap
          - name: Windows
            edition: standard
            editionLabel: Standard
            os: windows-latest
            script: npm run dist:win -- --publish never
            artifact: GitInsight-AI-Standard-Windows
            paths: |
              release/**/*.exe
              release/**/*.zip
              release/**/*.blockmap
          - name: macOS
            edition: lite
            editionLabel: Lite
            os: macos-latest
            script: npm run dist:mac -- --publish never
            artifact: GitInsight-AI-Lite-macOS
            paths: |
              release/**/*.dmg
              release/**/*.zip
              release/**/*.blockmap
          - name: macOS
            edition: standard
            editionLabel: Standard
            os: macos-latest
            script: npm run dist:mac -- --publish never
            artifact: GitInsight-AI-Standard-macOS
            paths: |
              release/**/*.dmg
              release/**/*.zip
              release/**/*.blockmap
          - name: Linux
            edition: lite
            editionLabel: Lite
            os: ubuntu-latest
            script: npm run dist:linux -- --publish never
            artifact: GitInsight-AI-Lite-Linux
            paths: |
              release/**/*.AppImage
              release/**/*.deb
              release/**/*.rpm
              release/**/*.tar.gz
              release/**/*.blockmap
          - name: Linux
            edition: standard
            editionLabel: Standard
            os: ubuntu-latest
            script: npm run dist:linux -- --publish never
            artifact: GitInsight-AI-Standard-Linux
            paths: |
              release/**/*.AppImage
              release/**/*.deb
              release/**/*.rpm
              release/**/*.tar.gz
              release/**/*.blockmap

    env:
      APP_EDITION: ${{ matrix.edition }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
      WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y rpm fakeroot

      - name: Typecheck
        run: npm run typecheck

      - name: Package
        run: ${{ matrix.script }}

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.paths }}
          if-no-files-found: error
          retention-days: 30

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.paths }}
          generate_release_notes: true
