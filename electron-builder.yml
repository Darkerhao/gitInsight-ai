appId: com.shuzhi.gitinsight-ai
productName: GitInsight AI
directories:
  output: release/${version}
files:
  - out/**/*
  - package.json
  - node_modules/sql.js/**/*
asar: true
asarUnpack:
  - node_modules/sql.js/dist/*.wasm
npmRebuild: false
compression: maximum
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
publish:
  provider: github
  releaseType: release
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
    - target: zip
      arch:
        - x64
  signtoolOptions:
    signingHashAlgorithms:
      - sha256
nsis:
  artifactName: ${productName}-${version}-${os}-${arch}-setup.${ext}
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
portable:
  artifactName: ${productName}-${version}-${os}-${arch}-portable.${ext}
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  category: public.app-category.developer-tools
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
    - target: rpm
      arch:
        - x64
    - target: tar.gz
      arch:
        - x64
  category: Development
